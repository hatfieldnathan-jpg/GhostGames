<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Games | Minimalist Arcade</title>
    <style>
        /* --- MINIMALIST DESIGN SYSTEM --- */
        :root {
            --bg: #080808;
            --card-bg: #121212;
            --accent: #9d00ff; /* Ghostly Purple */
            --text: #ffffff;
            --text-muted: #777777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            padding: 20px;
            text-align: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
        }

        .logo span {
            color: var(--accent);
            text-shadow: 0 0 12px var(--accent);
        }

        /* --- THE GRID --- */
        #game-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 20px 50px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- GAME CARD --- */
        .game-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border 0.2s ease;
            border: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: scale(1.03);
            border-color: var(--accent);
        }

        .thumb-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #181818;
        }

        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .game-title {
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-card:hover .game-title {
            color: var(--text);
        }

        /* --- GAME PLAYER (IFRAME) --- */
        #player-container {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
            padding: 0 20px 20px 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .back-btn {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .now-playing {
            font-weight: bold;
            color: var(--accent);
        }

        iframe {
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 10px;
            background: #000;
        }

        /* --- MOBILE TWEAKS --- */
        @media (max-width: 480px) {
            #game-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 0 10px;
            }
            #player-container {
                padding: 0 10px 10px 10px;
            }
            iframe {
                height: 80vh;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="closeGame()">Ghost<span>Games</span></div>
    </header>

    <main id="game-container">
        </main>

    <section id="player-container">
        <div class="top-bar">
            <button class="back-btn" onclick="closeGame()">← Back</button>
            <div class="now-playing" id="playing-title">Game Title</div>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </section>

    <script>
        /**
         * --- MODULAR GAME DATA ---
         * folder    → subfolder inside "Games/" (required)
         * main      → main HTML file (optional, default "index.html")
         * thumbnail → preview image (optional, default "thumbnail.webp")
         */
        const MY_GAMES = [
            {
                name: "Ragdoll Archers",
                folder: "Arrow Archers",
                main: "arrow.html",           // different from default
                thumbnail: "IMG_3142.webp"    // custom thumbnail name
            },
            {
                name: "Stickman Hook",
                folder: "Stickman Hook"
                // main → stick.html (auto)
                // thumbnail → thumbnail.webp (auto)
            }

            // ADD NEW GAMES LIKE THIS:
            // { name: "Game Name", folder: "folder-name" }
            // (Just drop folder inside Games/ with index.html + thumbnail.webp)
        ];

        const container = document.getElementById('game-container');
        const playerContainer = document.getElementById('player-container');
        const gameFrame = document.getElementById('game-frame');
        const playingTitle = document.getElementById('playing-title');

        // 1. Build the grid from modular data
        function init() {
            container.innerHTML = MY_GAMES.map(game => {
                const folder = game.folder;
                const mainFile = game.main || 'index.html';
                const thumbFile = game.thumbnail || 'thumbnail.webp';

                const gameUrl = `./Games/${folder}/${mainFile}`;
                const thumbUrl = `./Games/${folder}/${thumbFile}`;

                return `
                    <div class="game-card" onclick="openGame('${gameUrl}', '${game.name}')">
                        <div class="thumb-wrapper">
                            <img src="${thumbUrl}" alt="${game.name}" loading="lazy">
                        </div>
                        <div class="game-title">${game.name}</div>
                    </div>
                `;
            }).join('');
        }

        // 2. Open the selected game in the iframe
        function openGame(gameUrl, gameName) {
            container.style.display = 'none';
            playerContainer.style.display = 'flex';
            playingTitle.innerText = gameName;
            gameFrame.src = gameUrl;
        }

        // 3. Close the current game and return to the grid
        function closeGame() {
            gameFrame.src = "";
            playerContainer.style.display = 'none';
            container.style.display = 'grid';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
